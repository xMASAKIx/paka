<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>衣櫃收藏管理系統</title>
    <style>
        /* 深色模式全局設定 */
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
        }
        h1 { color: #ffffff; }
        
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 15px; 
            margin-top: 20px;
        }
        
        .card { 
            background: #1e1e1e; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            border: 2px solid #333;
            transition: transform 0.2s;
        }
        
        .card:hover { border-color: #555; }
        
        .card img { 
            width: 80px; 
            height: 120px; 
            display: block; 
            margin: 0 auto 5px; 
            border-radius: 4px;
        }
        
        /* 已擁有的角色：降低亮度並加上邊框 */
        .card.owned { 
            filter: grayscale(0.8) brightness(0.5); 
            border: 2px solid #4caf50; 
        }
        
        .card.owned::after { 
            content: "✔ 已擁有"; 
            display: block; 
            color: #4caf50; 
            font-weight: bold; 
            font-size: 10px; 
        }

        #jsonInput { color: #e0e0e0; }
    </style>
</head>
<body>
    <h1>衣櫃圖鑑</h1>
    <input type="file" id="jsonInput">
    <div id="stats" style="margin: 10px 0;">請上傳 JSON 進行比對</div>
    <div id="gallery" class="gallery"></div>

    <script src="images_list.js"></script>
    <script>
        function renderGallery(ownedIds = []) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            if (typeof allImageNames === 'undefined') {
                gallery.innerHTML = '<p style="color:red;">錯誤：找不到 images_list.js，請確認檔案位置！</p>';
                return;
            }

            allImageNames.forEach(filename => {
                const idFromFilename = filename.replace('.png', '');
                const isOwned = ownedIds.includes(idFromFilename);

                const div = document.createElement('div');
                div.className = `card ${isOwned ? 'owned' : ''}`;
                
                div.innerHTML = `
                    <img src="paka/${filename}" onerror="this.style.display='none'" alt="${idFromFilename}">
                    <div style="font-size: 10px; color: #aaa;">${idFromFilename}</div>
                `;
                gallery.appendChild(div);
            });
        }

        document.getElementById('jsonInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const myData = JSON.parse(event.target.result);
                renderGallery(myData.items || []);
            };
            reader.readAsText(e.target.files[0]);
        });

        window.onload = () => renderGallery([]);
    </script>
</body>
</html>
