<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PAKA頭管理系統</title>
    <style>
        /* 深色模式全局設定 */
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
        }
        h1 { color: #ffffff; }
        
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        
        .card { 
            background: #a6e2ff; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            border: 4px solid #106df7;
            transition: transform 0.2s;
        }
        
        .card:hover { border-color: #555; }
        
        .card img { 
            width: 160px; 
            height: 240px; 
            display: block; 
            margin: 0 auto 5px; 
            border-radius: 4px;
        }
        
        /* 已擁有的角色：降低亮度並加上邊框 */
        .card.owned { 
            filter: grayscale(0.5) brightness(0.7); 
            border: 4px solid #35bdf1; 
        }
        
        .card.owned::after { 
            content: "✔ 已擁有"; 
            display: block; 
            color: #0538f1; 
            font-weight: bold; 
            font-size: 12px; 
        }

        #jsonInput { color: #e0e0e0; }
    </style>
</head>
<body>
    <h1>PAKA頭圖鑑</h1>
    <input type="file" id="jsonInput">
    <div id="stats" style="margin: 10px 0;">匯入衣櫃 JSON </div>
       <div id="stats" style="font-size: 1.2em; font-weight: bold; color: #ffffff; margin: 10px 0;">
        請上傳 JSON 進行統計...路徑為C:\Users\admin\AppData\Roaming\Godot\app_userdata\Koga 你的PPSN名稱的JSON檔案
   <div id="gallery" class="gallery"></div>
   </div>
    <script src="images_list.js"></script>
    <script>
        function renderGallery(ownedIds = []) {
        const gallery = document.getElementById('gallery');
        const stats = document.getElementById('stats');
        gallery.innerHTML = '';
        
        let ownedCount = 0; // 用來計算已擁有的數量
        const totalCount = allImageNames.length; // 總數就是你的陣列長度

        allImageNames.forEach(filename => {
            const idOnly = filename.replace('.png', '');
            const isOwned = ownedIds.includes(idOnly);
            
            if (isOwned) ownedCount++; // 如果有擁有，計數加 1

            const finalPath = `paka/${idOnly}.png`;

            const div = document.createElement('div');
            div.className = `card ${isOwned ? 'owned' : ''}`;
            
            div.innerHTML = `
                <img src="${finalPath}" 
                     onerror="this.style.display='none'" 
                     alt="${idOnly}" 
                     style="width:160px; height:240px; display:block;">
                <div style="font-size: 12px; color: #004eff;">${idOnly}</div>
            `;
            gallery.appendChild(div);
        });

        // 更新統計文字
        stats.innerText = `總共：${totalCount} 個 | 已擁有：${ownedCount} 個 (完成度：${((ownedCount/totalCount)*100).toFixed(1)}%)`;
    }

        document.getElementById('jsonInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const myData = JSON.parse(event.target.result);
                renderGallery(myData.items || []);
            };
            reader.readAsText(e.target.files[0]);
        });

        window.onload = () => renderGallery([]);
    </script>
</body>
</html>
