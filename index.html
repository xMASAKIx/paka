<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>衣櫃收藏管理系統</title>
    <style>
        /* 深色模式全局設定 */
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
        }
        h1 { color: #ffffff; }
        
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 15px; 
            margin-top: 20px;
        }
        
        .card { 
            background: #a6e2ff; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            border: 4px solid #106df7;
            transition: transform 0.2s;
        }
        
        .card:hover { border-color: #555; }
        
        .card img { 
            width: 160px; 
            height: 240px; 
            display: block; 
            margin: 0 auto 5px; 
            border-radius: 4px;
        }
        
        /* 已擁有的角色：降低亮度並加上邊框 */
        .card.owned { 
            filter: grayscale(0.5) brightness(0.7); 
            border: 4px solid #35bdf1; 
        }
        
        .card.owned::after { 
            content: "✔ 已擁有"; 
            display: block; 
            color: #0538f1; 
            font-weight: bold; 
            font-size: 12px; 
        }

        #jsonInput { color: #e0e0e0; }
    </style>
</head>
<body>
    <h1>PAKA頭圖鑑</h1>
    <input type="file" id="jsonInput">
    <div id="stats" style="margin: 10px 0;">匯入衣櫃 JSON </div>
    <div id="gallery" class="gallery"></div>

    <script src="images_list.js"></script>
    <script>
        function renderGallery(ownedIds = []) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    
    allImageNames.forEach(filename => {
        // 1. 確保拿到純 ID (去掉可能存在的 .png)
        const idOnly = filename.replace('.png', '');
        const isOwned = ownedIds.includes(idOnly);

        // 2. 強制組裝路徑：一定是 "paka/" + ID + ".png"
        const finalPath = `paka/${idOnly}.png`;

        const div = document.createElement('div');
        div.className = `card ${isOwned ? 'owned' : ''}`;
        
        div.innerHTML = `
            <img src="${finalPath}" 
                 onerror="this.style.display='none'; console.error('找不到圖片:', '${finalPath}')" 
                 alt="${idOnly}" 
                 style="width:80px; height:120px; display:block;">
            <div style="font-size: 12px; color: #0538f1;">${idOnly}</div>
        `;
        gallery.appendChild(div);
    });
}

        document.getElementById('jsonInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const myData = JSON.parse(event.target.result);
                renderGallery(myData.items || []);
            };
            reader.readAsText(e.target.files[0]);
        });

        window.onload = () => renderGallery([]);
    </script>
</body>
</html>
