<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>衣櫃收藏管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .card { background: white; padding: 10px; border-radius: 8px; text-align: center; border: 2px solid transparent; }
        .card img { width: 80px; height: 80px; display: block; margin: 0 auto 5px; }
        .card.owned { filter: grayscale(1) brightness(0.6); border: 2px solid #333; }
        .card.owned::after { content: "✔ 已擁有"; display: block; color: #333; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>
    <h1>衣櫃圖鑑</h1>
    <input type="file" id="jsonInput">
    <div id="stats">預設顯示全部角色</div>
    <div id="gallery" class="gallery"></div>

    <script>
        // 這是你的資料庫，請確保這裡有所有角色的 id 和 itemName
        const allCharacters = [
            { "id": "1782499572.675_915", "itemName": "Tearju" },
            { "id": "1782499572.676_366", "itemName": "ΓRanma" },
            // ... 請將你全部的資料貼在這裡
        ];

        // 渲染函數
        function renderGallery(ownedIds = []) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            let count = 0;

            allCharacters.forEach(char => {
                // 比對邏輯：JSON 裡的 ID 是否在我們匯入的 ownedIds 清單中
                const isOwned = ownedIds.includes(char.id);
                if (isOwned) count++;

                // 圖片路徑邏輯：依照檔案名稱 (itemName) 來找 paka 資料夾內的圖片
                const imagePath = `paka/${char.itemName}.png`;

                const div = document.createElement('div');
                div.className = `card ${isOwned ? 'owned' : ''}`;
                div.innerHTML = `
                    <img src="${imagePath}" onerror="this.src='https://via.placeholder.com/80?text=無圖'" alt="${char.itemName}">
                    <div style="font-size: 10px;">${char.itemName}</div>
                `;
                gallery.appendChild(div);
            });
            document.getElementById('stats').innerText = `已擁有：${count} / ${allCharacters.length}`;
        }

        // 1. 網頁開啟時，直接執行渲染 (傳入空陣列，代表還沒匯入資料)
        window.onload = () => renderGallery([]);

        // 2. 匯入檔案後，執行比對
        document.getElementById('jsonInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const myData = JSON.parse(event.target.result);
                // 抓出匯入資料中的 ID 陣列
                const ownedIds = myData.map(item => item.id);
                renderGallery(ownedIds);
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
